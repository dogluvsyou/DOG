<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KENNEL // DogLuvsYou</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111111; 
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 30px 15px 100px 15px;
            overflow-x: hidden;
        }

        /* BACK FEED HANDLE */
        .back-home {
            display: inline-block;
            font-family: 'Impact', sans-serif;
            font-size: 1.1rem;
            color: #ff003c;
            text-decoration: none;
            text-transform: uppercase;
            border: 3px solid #ff003c;
            padding: 6px 12px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0px #ff003c;
        }
        .back-home:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ff003c;
        }

        /* HEADER */
        .zine-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .zine-title {
            font-family: 'Impact', sans-serif;
            font-size: 5rem;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: 0.85;
            color: #ffffff;
            -webkit-text-stroke: 2px #ffffff;
        }
        .zine-subtitle {
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #ff003c;
            margin-top: 15px;
            padding: 0 10px;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        /* ASYMMETRICAL STREAM */
        #propaganda-stream {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            gap: 60px; 
        }

        /* STICKER POSTS */
        .meme-post {
            background: #1a1a1a;
            border: 4px solid #ffffff;
            box-shadow: 10px 10px 0px #ffffff; 
            padding: 8px;
            width: 100%; 
            transition: transform 0.3s ease;
        }

        .meme-post img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(20%); 
        }

        .meme-post.size-medium { max-width: 85%; }
        .meme-post.size-large { max-width: 100%; }
        
        .meme-post.align-left { align-self: flex-start; }
        .meme-post.align-right { align-self: flex-end; }
        .meme-post.align-center { align-self: center; }

        #infinite-sentinel {
            width: 100%;
            height: 40px;
            text-align: center;
            font-family: monospace;
            color: #444444;
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes postFadeIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← HOME</a>

    <header class="zine-header">
        <h1 class="zine-title">KENNEL</h1>
        <p class="zine-subtitle">“lock me up before I hurt myself or someone else”</p>
    </header>

    <main id="propaganda-stream"></main>
    <div id="infinite-sentinel">generating transmission...</div>

    <script>
        // CHRONOLOGICAL MASTER REPO MATRIX
        const memeImages = [
            'IMG_2353.jpeg',
            'IMG_3395.png',
            'IMG_3396.png',
            'IMG_3413.png',
            'IMG_3415.png',
            'IMG_3416.png',
            'IMG_3418.png',
            'IMG_3422.png',
            'IMG_3423.png',
            'IMG_3424.png',
            'IMG_3425.png',
            'IMG_3429.png',
            'IMG_3442.png',
            'IMG_3856.png',
            'IMG_3878.png'
        ];

        const stream = document.getElementById('propaganda-stream');
        const sentinel = document.getElementById('infinite-sentinel');

        const sizes = ['size-medium', 'size-large'];
        const alignments = ['align-left', 'align-right', 'align-center'];

        // Chronological pointer variable tracking
        let currentImageIndex = 0;

        // =========================================================
        // SEQUENCED / RANDOMIZED SPAWNER ENGINE
        // =========================================================
        function generateMemeBlock() {
            let selectedImg;

            // Step 1: Play through the images in order first
            if (currentImageIndex < memeImages.length) {
                selectedImg = memeImages[currentImageIndex];
                currentImageIndex++;
            } else {
                // Step 2: Once pool is drained, drop into an infinite loop of random choices
                selectedImg = memeImages[Math.floor(Math.random() * memeImages.length)];
            }
            
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            const randomAlign = alignments[Math.floor(Math.random() * alignments.length)];
            const randomTilt = (Math.random() * 5 - 2.5).toFixed(2); 

            const postCard = document.createElement('div');
            postCard.className = `meme-post ${randomSize} ${randomAlign}`;
            postCard.style.transform = `rotate(${randomTilt}deg)`;
            postCard.style.animation = `postFadeIn 0.4s ease forwards`;

            postCard.innerHTML = `<img src="${selectedImg}" alt="kennel allocation">`;
            
            stream.appendChild(postCard);
        }

        // Initial Seed Batch: Displays the first 5 images in chronological order right away
        for (let i = 0; i < 5; i++) {
            generateMemeBlock();
        }

        // =========================================================
        // INFINITE SCROLL SYSTEM
        // =========================================================
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Spawns next batch sequentially or chaotic fallback
                    setTimeout(() => {
                        generateMemeBlock();
                        generateMemeBlock();
                        generateMemeBlock();
                    }, 100);
                }
            });
        }, { rootMargin: '300px' }); 

        observer.observe(sentinel);
    </script>

</body>
</html>
