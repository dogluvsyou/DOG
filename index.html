<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="site-header">
        <img src="IMG_6742.png" alt="DOG" class="header-logo">
    </header>

    <div id="button-stack"></div>

    <script>
        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. YOUR THREE DOG IMAGES
        const dogImages = [
            '<img src="Pug.png" alt="pug">',
            '<img src="Poodle.png" alt="poodle">',
            '<img src="Dalmation.png" alt="dalmation">'
        ];

        // Shuffle the array order completely on every refresh
        dogImages.sort(() => Math.random() - 0.5);

        const container = document.getElementById('button-stack');

        // Loop through the shuffled list and build the rows
        dogImages.forEach((imageHtml) => {
            // Create a full-width row wrapper
            const row = document.createElement('div');
            row.className = 'dog-row';

            // Create the borderless button
            const button = document.createElement('button');
            button.className = 'dog-btn';
            button.innerHTML = imageHtml;

            // Generate slight organic chaos (tilt between -8 and +8 degrees)
            const randomTilt = Math.floor(Math.random() * 16) - 8;
            
            // Subtle horizontal shift (left or right by up to 15 pixels)
            const randomShift = Math.floor(Math.random() * 30) - 15;

            // Apply style effects directly to the inner button
            button.style.transform = `translateX(${randomShift}px) rotate(${randomTilt}deg)`;

            row.appendChild(button);
            container.appendChild(row);
        });
    </script>
</body>
</html>
