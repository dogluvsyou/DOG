<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* PURE CUTE FLOATING PAW (Top Left) */
        #music-player {
            position: fixed; 
            top: 25px; 
            left: 25px; 
            z-index: 9999;
        }
        #paw-trigger {
            background: none !important;
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
            font-size: 30px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* FLUFFY PASTEL LINKTREE DRAWER */
        .leash-drawer {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(10px); 
            border-radius: 24px; 
            margin-top: -15px; 
            margin-bottom: 25px;
            padding: 20px;
            display: none; 
            flex-direction: column;
            gap: 12px;
            z-index: 2;
            animation: drawerSlideDown 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        .leash-drawer.active {
            display: flex;
        }
        
        .leash-link {
            display: block;
            width: 100%;
            padding: 14px;
            color: #111111;
            text-align: center;
            text-decoration: none;
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            border-radius: 16px;
            border: none;
            transition: transform 0.1s ease;
        }
        .leash-link:active {
            transform: scale(0.97);
        }
        
        .leash-mail-form {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .leash-mail-form label {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            color: #444444;
            font-size: 0.9rem;
            padding-left: 5px;
        }
        .leash-mail-box {
            display: flex;
            background: #ffffff;
            border-radius: 14px;
            padding: 4px;
            overflow: hidden;
        }
        .leash-mail-box input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            font-family: system-ui, sans-serif;
            font-size: 1rem;
            outline: none;
            background: transparent;
        }
        .leash-mail-box button {
            background: #111111; 
            color: #ffffff;
            border: none;
            font-family: system-ui, sans-serif;
            font-weight: 700;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* CUSTOM CENTERED CUTE POPUP OVERLAY */
        #cute-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .cute-popup-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 24px;
            text-align: center; /* PERFECTLY CENTERED */
            width: 85%;
            max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            animation: popupGrow 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }
        .cute-popup-text {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: #111111;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .cute-popup-btn {
            background: #111111;
            color: #ffffff;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        @keyframes drawerSlideDown {
            0% { transform: translateY(-10px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes popupGrow {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Naked Paw Music Trigger Layer -->
        <div id="music-player">
        <button id="paw-trigger">🐾</button>
        <audio id="audio-track"></audio>
    </div>


    <!-- Custom Center-Aligned Popup Structure -->
    <div id="cute-popup-overlay">
        <div class="cute-popup-box">
            <p class="cute-popup-text" id="popup-message-target"></p>
            <button class="cute-popup-btn" onclick="closeCutePopup()">OK</button>
        </div>
    </div>

    <div id="shape-canvas"></div>

    <header id="site-header">
        <img src="IMG_6742.png" alt="DOG" class="header-logo">
    </header>

    <div id="button-stack"></div>

    <footer id="site-footer">
        <p class="tagline" data-text="your new best friend™">your new best friend&trade;</p>
    </footer>

    <script>
        // CUSTOM POPUP ALIGNMENT LOGIC SWITCHES
        function openCutePopup(msg) {
            document.getElementById('popup-message-target').innerText = msg;
            document.getElementById('cute-popup-overlay').style.display = 'flex';
        }
        function closeCutePopup() {
            document.getElementById('cute-popup-overlay').style.display = 'none';
        }

        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. BACKGROUND DYNAMIC VECTOR GENERATOR
        const canvas = document.getElementById('shape-canvas');
        const shapeCount = 35; 

        const starPath = "M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z";
        const heartPath = "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";

        for (let i = 0; i < shapeCount; i++) {
            const posX = Math.random() * 100;
            const posY = Math.random() * 100;
            const size = Math.floor(Math.random() * 73) + 12; 
            const rotation = Math.floor(Math.random() * 360);
            const opacity = (Math.random() * 0.35) + 0.15;

            const selectedPath = Math.random() > 0.5 ? starPath : heartPath;

            const svgElement = `
                <svg style="position: absolute; left: ${posX}vw; top: ${posY}vh; width: ${size}px; height: ${size}px; transform: rotate(${rotation}deg); opacity: ${opacity};" viewBox="0 0 24 24">
                    <path d="${selectedPath}" fill="#ffffff" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
                </svg>
            `;
            canvas.innerHTML += svgElement;
        }

        // 3. VIBRANT FONT TEXT COLORS
        const textColors = ['#ff003c', '#0044ff', '#00cc44', '#ffcc00'];

        // 4. FIXED FONTS LOTTERY
        const textFonts = ['comicsans', 'times', 'impact'];

        // 5. EXPANDED DOG POOL
        const dogImages = [
            '<img src="Pug.png" alt="Pug">',
            '<img src="Poodle.png" alt="Poodle">',
            '<img src="Dalmation.png" alt="Dalmation">',
            '<img src="Germshep.png" alt="German Shepherd">',
            '<img src="Greatdane.png" alt="Great Dane">'
        ];

        // 6. NAV LINKS POOL (ASTRAY fully rebranded to KENNEL!)
        const menuLinks = ['SWAG', 'KENNEL', 'DOGTUBE', 'BARK', 'LEASH'];

        dogImages.sort(() => Math.random() - 0.5);

        const container = document.getElementById('button-stack');

        menuLinks.forEach((textLabel, index) => {
            const stackGroup = document.createElement('div');
            stackGroup.className = 'button-group-wrapper';
            stackGroup.style.width = '100%';
            stackGroup.style.display = 'flex';
            stackGroup.style.flexDirection = 'column';
            stackGroup.style.alignItems = 'center';

            const row = document.createElement('div');
            row.className = 'dog-row';

            const button = document.createElement('button');
            button.className = 'dog-btn';

            const assignedDogHtml = dogImages[index % dogImages.length];

            button.innerHTML = `
                ${assignedDogHtml}
                <span class="btn-text" data-text="${textLabel}">${textLabel}</span>
            `;

            const randomFont = textFonts[Math.floor(Math.random() * textFonts.length)];
            const randomColor = textColors[Math.floor(Math.random() * textColors.length)];

            const randomTilt = Math.floor(Math.random() * 12) - 6; 
            const randomShift = Math.floor(Math.random() * 24) - 12;

            button.style.setProperty('--base-tilt', `${randomTilt}deg`);
            button.style.setProperty('--base-shift', `${randomShift}px`);
            button.style.setProperty('--btn-font-token', randomFont);
            button.style.setProperty('--btn-color', randomColor);

            row.appendChild(button);
            stackGroup.appendChild(row);

            if (textLabel === 'LEASH') {
                const drawer = document.createElement('div');
                drawer.id = 'leash-dropdown-drawer';
                drawer.className = 'leash-drawer';
                
                drawer.innerHTML = `
                    <a href="https://patreon.com" target="_blank" class="leash-link" style="background:#ffc9d7;">Patreon</a>
                    <a href="#" id="nsfw-gate-link" class="leash-link" style="background:#fffbc8;">Hidden (18+)</a>
                    <a href="https://telegram.org" target="_blank" class="leash-link" style="background:#b8d7e9;">Telegram</a>
                    <a href="#" class="leash-link" style="background:#d1f3c5;" onclick="openCutePopup('WeChat ID: DogLuvsYouOfficial'); return false;">WeChat</a>
                    
                    <form onsubmit="openCutePopup('Subscribed!'); this.reset(); return false;" class="leash-mail-form">
                        <label>Join Mailing List</label>
                        <div class="leash-mail-box">
                            <input type="email" placeholder="your email..." required>
                            <button type="submit">Join</button>
                        </div>
                    </form>
                `;
                
                drawer.querySelector('#nsfw-gate-link').addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm("WARNING: This section contains 18+ content. Do you confirm you are of legal age to view this content?")) {
                        window.open('https://yournsfwlink.com', '_blank'); 
                    }
                });

                stackGroup.appendChild(drawer);
            }

            // =========================================================
            // ACTION ROUTING ENGINE (Updated with custom popup message)
            // =========================================================
            button.addEventListener('click', () => {
                if (textLabel === 'KENNEL') {
                    window.location.href = 'propaganda.html';
                } else if (textLabel === 'LEASH') {
                    const targetDrawer = document.getElementById('leash-dropdown-drawer');
                    targetDrawer.classList.toggle('active');
                } else if (textLabel === 'SWAG' || textLabel === 'BARK') {
                    openCutePopup('🐶🐾COMING SOON🐾🐶');
                } else if (textLabel === 'DOGTUBE') {
                    window.open('https://www.youtube.com/watch?v=vVU72tfPUwk', '_blank');
                }
            });

            container.appendChild(stackGroup);
        });

      // =========================================================
// RANDOMIZED TRACK JUKEBOX ENGINE
// =========================================================
// Add the exact filenames of your tracks here (All caps to match your repo!)
const playlist = [
    'COUP.MP3',
    'moon.MP3',
    'EGYEL.MP3'
];

const paw = document.getElementById('paw-trigger');
const audio = document.getElementById('audio-track');

// 1. Pick a completely random song right out of the gate
let currentTrackIndex = Math.floor(Math.random() * playlist.length);

function loadTrack(index) {
    audio.src = playlist[index];
    audio.preload = "auto";
}

// Initialize the first random song choice
loadTrack(currentTrackIndex);

// 2. Play / Pause Click Handler
paw.addEventListener('click', () => {
    if (audio.paused) {
        audio.play()
            .then(() => {
                paw.innerText = '🔊';
                paw.style.transform = 'scale(1.15)';
            })
            .catch(err => {
                console.log("Audio interface engagement required: ", err);
            });
    } else {
        audio.pause();
        paw.innerText = '🐾';
        paw.style.transform = 'scale(1)';
    }
});

// 3. Auto-Shuffle Handler: When a song ends, pick a new random one and keep rolling
audio.addEventListener('ended', () => {
    let nextTrackIndex;
    
    // Prevent the engine from accidentally picking the exact same song twice in a row
    do {
        nextTrackIndex = Math.floor(Math.random() * playlist.length);
    } while (playlist.length > 1 && nextTrackIndex === currentTrackIndex);
    
    currentTrackIndex = nextTrackIndex;
    loadTrack(currentTrackIndex);
    
    // Autoplay the next track seamlessly
    audio.play().catch(err => console.log("Shuffle progression delayed: ", err));
});

    </script>
</body>
</html>
