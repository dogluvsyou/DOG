<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="site-header">
        <img src="IMG_6742.png" alt="DOG" class="header-logo">
    </header>

    <div id="button-container"></div>

    <script>
        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. LABELS LIST
        const buttonLabels = [
            '<img src="Pug.png" alt="pug">',
            '<img src="Poodle.png" alt="poodle">',
            '<img src="Dalmation.png" alt="dalmation">',
            '<span class="emoji-btn">🐶</span>',
            '<span class="emoji-btn">🦮</span>',
            '<span class="emoji-btn">🐕‍🦺</span>',
            '<span class="emoji-btn">🐕</span>',
            '<span class="emoji-btn">🐾</span>'
        ];

        const container = document.getElementById('button-container');

        // Capture layout dimensions
        const containerWidth = window.innerWidth;
        // Target available height below your large header
        const headerHeight = document.getElementById('site-header').offsetHeight || 250;
        const containerHeight = window.innerHeight - headerHeight;

        // Grid sector allocation setup (e.g., 4 columns x 2 rows = 8 distinct zones)
        const cols = 4;
        const rows = 2;
        const sectorWidth = containerWidth / cols;
        const sectorHeight = containerHeight / rows;

        // Create a list of all available sector coordinates
        let sectors = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                sectors.push({ col: c, row: r });
            }
        }

        // Shuffle sectors randomly so the dogs don't spawn in a boring, predictable order
        sectors.sort(() => Math.random() - 0.5);

        // Map every single item to its own isolated sector
        buttonLabels.forEach((imageHtml, index) => {
            // Safety check if items exceed total grid sectors
            if (index >= sectors.length) return; 

            const button = document.createElement('button');
            button.className = 'random-btn';
            button.innerHTML = imageHtml;

            const sector = sectors[index];

            // Find center coordinates of the assigned zone
            const sectorCenterX = (sector.col * sectorWidth) + (sectorWidth / 2);
            const sectorCenterY = (sector.row * sectorHeight) + (sectorHeight / 2) + headerHeight;

            // Introduce a subtle, controlled drift within their own zone so it still looks completely organic
            const maxDriftX = sectorWidth * 0.15;
            const maxDriftY = sectorHeight * 0.15;
            
            const driftX = (Math.random() * maxDriftX * 2) - maxDriftX;
            const driftY = (Math.random() * maxDriftY * 2) - maxDriftY;

            const finalX = sectorCenterX + driftX;
            const finalY = sectorCenterY + driftY;

            // Generate size and rotation configurations
            const randomSize = Math.random() * (3.2 - 2.2) + 2.2;
            const randomRotation = Math.floor(Math.random() * 80) - 40;

            // Style placement mapping using translate coordinates directly
            button.style.left = '0px';
            button.style.top = '0px';
            button.style.transform = `translate3d(${finalX}px, ${finalY}px, 0) translate(-50%, -50%) scale(${randomSize}) rotate(${randomRotation}deg)`;

            container.appendChild(button);
        });
    </script>
</body>
</html>
