<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="button-container"></div>

    <script>
        // 1. YOUR EXACT PASTEL BACKGROUND PALETTE
        const bgColors = [
            '#b8d7e9', // Baby Blue
            '#d1f3c5', // Clean Green
            '#ffc9d7', // Vibrant Red
            '#fffbc8'  // Warm Yellow
        ];
        
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. POODLE BUTTON GENERATOR
        const TOTAL_BUTTONS = 6; 
        const container = document.getElementById('button-container');
        
        // Link to your uploaded poodle image
        const buttonLabels = ['<img src="IMG_6738.png"alt="poodle">'];

        for (let i = 0; i < TOTAL_BUTTONS; i++) {
            const button = document.createElement('button');
            button.className = 'random-btn';
            
            button.innerHTML = buttonLabels[0];

            // Positioning matrix (-20% to 100% for that 1/5th off-screen look)
            const randomX = Math.floor(Math.random() * 120) - 20;
            const randomY = Math.floor(Math.random() * 120) - 20;

            button.style.left = randomX + '%';
            button.style.top = randomY + '%';

            // Size variance (1.2x to 2.2x scale)
            const randomSize = Math.random() * (2.2 - 1.2) + 1.2;
            
            // Random rotation angle from -45 to +45 degrees
            const randomRotation = Math.floor(Math.random() * 90) - 45;

            // Apply size and rotation together smoothly
            button.style.transform = `scale(${randomSize}) rotate(${randomRotation}deg)`;

            container.appendChild(button);
        }
    </script>
</body>
</html>
