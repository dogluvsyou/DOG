<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="site-header">
        <img src="IMG_6742.png" alt="DOG" class="header-logo">
    </header>

    <div id="button-container"></div>

    <script>
        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. LABELS LIST (Keeps your native emojis!)
        const buttonLabels = [
            '<img src="Pug.png" alt="pug">',
            '<img src="Poodle.png" alt="poodle">',
            '<img src="Dalmation.png" alt="dalmation">',
            '<span class="emoji-btn">🐶</span>',
            '<span class="emoji-btn">🦮</span>',
            '<span class="emoji-btn">🐕‍🦺</span>',
            '<span class="emoji-btn">🐕</span>',
            '<span class="emoji-btn">🐾</span>'
        ];

        const container = document.getElementById('button-container');
        const placedButtons = [];

        // Center-to-Center Overlap Inspector
        function doesOverlap(newX, newY, newSize, placedItems) {
            // Give every item a flat 160px base radius scaled up by its size multiplier
            const newRadius = 160 * (newSize / 2); 
            
            for (let item of placedItems) {
                const oldRadius = 160 * (item.size / 2);
                
                // Pure center-point distance check (perfectly circular safety shield)
                const dx = newX - item.x;
                const dy = newY - item.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < (newRadius + oldRadius)) {
                    return true;
                }
            }
            return false;
        }

        // Generate elements based on their mathematical center point
        buttonLabels.forEach((imageHtml) => {
            const button = document.createElement('button');
            button.className = 'random-btn';
            button.innerHTML = imageHtml;

            // Get total window bounds in pixels for true distance tracking
            const containerWidth = window.innerWidth;
            const containerHeight = window.innerHeight - 250; // Accounting for your large header

            let pixelX, pixelY, randomSize, randomRotation;
            let attempts = 0;
            const maxAttempts = 500; // Increased to ensure it finds a clean spot

            do {
                // Generate random pixel coordinates instead of fluid percentages
                // Keeps them safely away from the exact margins
                pixelX = Math.floor(Math.random() * (containerWidth * 0.8)) + (containerWidth * 0.1);
                pixelY = Math.floor(Math.random() * (containerHeight * 0.7)) + (containerHeight * 0.15);
                
                randomSize = Math.random() * (3.5 - 2.2) + 2.2;
                randomRotation = Math.floor(Math.random() * 90) - 45;
                attempts++;
            } while (doesOverlap(pixelX, pixelY, randomSize, placedButtons) && attempts < maxAttempts);

            // Save center coordinates
            placedButtons.push({ x: pixelX, y: pixelY, size: randomSize });

            // Position from top-left, but translate back by 50% so left/top targets the EXACT center
            button.style.left = pixelX + 'px';
            button.style.top = pixelY + 'px';
            button.style.transform = `translate(-50%, -50%) scale(${randomSize}) rotate(${randomRotation}deg)`;

            container.appendChild(button);
        });
    </script>
</body>
</html>
