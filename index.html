<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="site-header">
        <img src="IMG_6742.png" alt="DOG" class="header-logo">
    </header>

    <div id="button-container"></div>

    <script>
        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. YOUR LABELS LIST
        const buttonLabels = [
            '<img src="Pug.png" alt="pug">',
            '<img src="Poodle.png" alt="poodle">',
            '<img src="Dalmation.png" alt="dalmation">',
            '<span class="emoji-btn">🐶</span>',
            '<span class="emoji-btn">🦮</span>',
            '<span class="emoji-btn">🐕‍🦺</span>',
            '<span class="emoji-btn">🐕</span>',
            '<span class="emoji-btn">🐾</span>'
        ];

        const container = document.getElementById('button-container');
        const placedButtons = [];

        // Overlap safety inspector
        function doesOverlap(newX, newY, newSize, placedItems) {
            // FIX: Boosted base multiplier from 60 to 110 to account for massive visual sizes
            const newRadius = (110 * newSize) * 0.9; 
            for (let item of placedItems) {
                const oldRadius = (110 * item.size) * 0.9;
                const dx = newX - item.x;
                const dy = newY - item.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < (newRadius + oldRadius)) {
                    return true;
                }
            }
            return false;
        }

        // Generate non-overlapping buttons safely below header area
        buttonLabels.forEach((imageHtml) => {
            const button = document.createElement('button');
            button.className = 'random-btn';
            button.innerHTML = imageHtml;

            let randomX, randomY, randomSize, randomRotation;
            let attempts = 0;
            const maxAttempts = 300; // Increased attempts so code works harder to find a perfect open spot

            do {
                // Wide horizontal bounds
                randomX = Math.floor(Math.random() * 90) - 5;
                // Vertical bounds adjusted to leave plenty of room under your new large header
                randomY = Math.floor(Math.random() * 70) + 10;
                
                randomSize = Math.random() * (3.5 - 2.2) + 2.2;
                randomRotation = Math.floor(Math.random() * 90) - 45;
                attempts++;
            } while (doesOverlap(randomX, randomY, randomSize, placedButtons) && attempts < maxAttempts);

            placedButtons.push({ x: randomX, y: randomY, size: randomSize });

            button.style.left = randomX + '%';
            button.style.top = randomY + '%';
            button.style.transform = `scale(${randomSize}) rotate(${randomRotation}deg)`;

            container.appendChild(button);
        });
    </script>
</body>
</html>
