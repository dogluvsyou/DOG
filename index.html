<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="button-container"></div>

    <script>
        // 1. BACKGROUND PALETTE
        const bgColors = ['#b8d7e9', '#d1f3c5', '#ffc9d7', '#fffbc8'];
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. YOUR EXACT CAPITALIZED IMAGES (No Duplicates)
        const buttonLabels = [
            '<img src="Pug.png" alt="pug">',
            '<img src="Poodle.png" alt="poodle">',
            '<img src="Dalmation.png" alt="dalmation">',
            '<span class="emoji-btn">🐶</span>',
            '<span class="emoji-btn">🦮</span>',
            '<span class="emoji-btn">🐕‍🦺</span>',
            '<span class="emoji-btn">🐕</span>',
            '<span class="emoji-btn">🐾</span>'
        ];

        const container = document.getElementById('button-container');
        const placedButtons = [];

        // Helper function to check if two buttons overlap by more than 10%
        function doesOverlap(newX, newY, newSize, placedItems) {
            // Estimate element radius based on size metric
            const newRadius = (60 * newSize) * 0.9; // 0.9 allows a tight 10% overlap cushion

            for (let item of placedItems) {
                const oldRadius = (60 * item.size) * 0.9;
                
                // Calculate distance between centers using Pythagorean theorem
                const dx = newX - item.x;
                const dy = newY - item.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // If distance is less than the combined radii, they overlap too much
                if (distance < (newRadius + oldRadius)) {
                    return true;
                }
            }
            return false;
        }

        // Loop exactly through the array items with no duplicates
        buttonLabels.forEach((imageHtml) => {
            const button = document.createElement('button');
            button.className = 'random-btn';
            button.innerHTML = imageHtml;

            let randomX, randomY, randomSize, randomRotation;
            let attempts = 0;
            const maxAttempts = 200; // Prevents infinite loops if screen is too packed

            // Keep rolling coordinates until a relatively open spot is found
            do {
                // Keep boundaries inward (-5% to 85%) so giant scale fits cleanly
                randomX = Math.floor(Math.random() * 90) - 5;
                randomY = Math.floor(Math.random() * 90) - 5;
                randomSize = Math.random() * (3.5 - 2.2) + 2.2;
                randomRotation = Math.floor(Math.random() * 90) - 45;
                attempts++;
            } while (doesOverlap(randomX, randomY, randomSize, placedButtons) && attempts < maxAttempts);

            // Save the coordinates to compare against the next dog
            placedButtons.push({ x: randomX, y: randomY, size: randomSize });

            // Apply layout attributes
            button.style.left = randomX + '%';
            button.style.top = randomY + '%';
            button.style.transform = `scale(${randomSize}) rotate(${randomRotation}deg)`;

            container.appendChild(button);
        });
    </script>
</body>
</html>
