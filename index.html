<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="button-container"></div>

    <script>
        // 1. RANDOM BACKGROUND COLOR SETUP
        // You can tweak these exact hex codes to get the perfect shades
        const bgColors = [
            '#87CEEB', // Baby Blue
            '#2ed573', // Clean Green
            '#ff4757', // Vibrant Red
            '#feca57'  // Warm Yellow
        ];
        
        // Pick one at random and apply it to the page background
        const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
        document.body.style.backgroundColor = randomBg;

        // 2. RANDOM BUTTON GENERATOR
        const TOTAL_BUTTONS = 15; 
        const container = document.getElementById('button-container');
        
        // Custom labels: You can use plain text, emojis, or even <img> tags for your images!
        // Example with images: '<img src="your-image.png" alt="button">'
        const buttonLabels = ['🐶', 'Click Me', 'Woof!', 'DOG', '🐾', 'Bone', 'Play', '🐕', 'Love'];

        for (let i = 0; i < TOTAL_BUTTONS; i++) {
            const button = document.createElement('button');
            button.className = 'random-btn';
            
            // Pick a random label/image
            const randomLabel = buttonLabels[Math.floor(Math.random() * buttonLabels.length)];
            button.innerHTML = randomLabel;

            // Positioning logic (-20% to 100% allows up to 1/5th overflow)
            const randomX = Math.floor(Math.random() * 120) - 20;
            const randomY = Math.floor(Math.random() * 120) - 20;

            button.style.left = randomX + '%';
            button.style.top = randomY + '%';

            // Random sizes for variation
            const randomSize = Math.random() * (1.5 - 0.8) + 0.8;
            button.style.transform = `scale(${randomSize})`;

            container.appendChild(button);
        }
    </script>
</body>
</html>
