<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogLuvsYou</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="button-container"></div>

    <script>
        // Configuration
        const TOTAL_BUTTONS = 15; // Change this to add more or fewer buttons
        const container = document.getElementById('button-container');
        
        // Array of text or emojis you want on your buttons
        const buttonLabels = ['🐶', 'Click Me', 'Woof!', 'DOG', '🐾', 'Bone', 'Play', '🐕', 'Love'];

        for (let i = 0; i < TOTAL_BUTTONS; i++) {
            const button = document.createElement('button');
            button.className = 'random-btn';
            
            // Pick a random label from our list
            const randomLabel = buttonLabels[Math.floor(Math.random() * buttonLabels.length)];
            button.innerHTML = randomLabel;

            // Generate random positions from -20% to 100% 
            // (-20% allows buttons to sit up to 1/5th off the left/top edges)
            const randomX = Math.floor(Math.random() * 120) - 20;
            const randomY = Math.floor(Math.random() * 120) - 20;

            // Apply the random coordinates
            button.style.left = randomX + '%';
            button.style.top = randomY + '%';

            // Optional: Randomize button sizes slightly for chaos
            const randomSize = Math.random() * (1.5 - 0.8) + 0.8;
            button.style.transform = `scale(${randomSize})`;

            container.appendChild(button);
        }
    </script>
</body>
</html>
