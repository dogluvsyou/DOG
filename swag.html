<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG // DOG</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: "Times New Roman", Times, serif;
            padding: 20px 10px 100px 10px;
            overflow-x: hidden;
        }

        /* RETRO MINIMAL TOP NAVIGATION */
        .shop-nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            border-bottom: 1px dashed #000000;
            padding-bottom: 10px;
        }
        .back-home {
            font-family: "Tahoma", Arial, sans-serif;
            font-size: 0.8rem;
            color: #000000;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .cart-status {
            font-family: monospace;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* BRAND MAIN HEADER CONTAINER */
        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-header h1 {
            font-family: "Times New Roman", Times, serif;
            font-size: 4.5rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 15px;
            user-select: none;
        }

        /* HERO LOOKBOOK DISPLAY BANNER */
        .hero-lookbook-wrap {
            max-width: 800px;
            margin: 0 auto 50px auto;
            width: 100%;
            border: 1px solid #000000;
        }
        .hero-lookbook-wrap img {
            width: 100%;
            height: auto;
            display: block;
            filter: contrast(1.05) brightness(0.95);
        }

        /* TEXT VIBE SPLITTERS */
        .vibe-divider {
            text-align: center;
            margin: 60px auto;
            max-width: 600px;
        }
        .vibe-divider .graphic-line {
            display: block;
            font-size: 14px;
            letter-spacing: 3px;
            color: #888888;
            margin-bottom: 10px;
            user-select: none;
        }
        .vibe-divider p {
            font-style: italic;
            font-size: 1.4rem;
            line-height: 1.3;
            color: #000000;
        }

        /* SHOP FEED ARCHITECTURE GRID */
        .shop-stream-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .product-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 15px;
        }
